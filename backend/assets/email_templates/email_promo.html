<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{SUBJECT}}</title>
<div style="display:none;max-height:0;overflow:hidden;font-size:1px;color:#fafafa">
{{PREVIEW_TEXT}}&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;
</div>
</head>
<body style="margin:0;padding:0;background:#f4f5f7;font-family:Arial,Helvetica,sans-serif">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f5f7;padding:40px 0">
  <tr><td align="center">
  <table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:10px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.08)">

    <!-- Header with accent stripe -->
    <tr>
      <td style="background:{{HEADER_COLOR}};padding:0">
        <div style="background:{{ACCENT_COLOR}};height:6px"></div>
        <div style="padding:28px 40px 28px;text-align:center">
          <h1 style="margin:0;font-size:26px;font-weight:900;color:#ffffff">{{BRAND_NAME}}</h1>
          <p style="margin:8px 0 0;font-size:13px;color:rgba(255,255,255,0.72);font-weight:600;
                    letter-spacing:0.08em;text-transform:uppercase">Limited Offer</p>
        </div>
      </td>
    </tr>

    <!-- Promo headline band -->
    <tr>
      <td style="background:{{ACCENT_COLOR}};padding:22px 48px;text-align:center">
        <h2 style="margin:0;font-size:22px;font-weight:900;color:#ffffff;line-height:1.2">
          {{HEADLINE}}
        </h2>
      </td>
    </tr>

    <!-- Body -->
    <tr>
      <td style="padding:40px 48px 28px">
        <p style="margin:0 0 28px;font-size:16px;line-height:1.75;color:#4a5568">
          {{BODY_CONTENT}}
        </p>
        <!-- CTA -->
        <table cellpadding="0" cellspacing="0" style="margin:0 auto 32px">
          <tr>
            <td style="background:{{ACCENT_COLOR}};border-radius:8px;padding:18px 44px">
              <a href="{{BRAND_URL}}"
                 style="color:{{CTA_TEXT_COLOR}};font-size:17px;font-weight:900;text-decoration:none;display:block">
                {{CTA_TEXT}}
              </a>
            </td>
          </tr>
        </table>
        <p style="margin:0;font-size:14px;line-height:1.6;color:#718096;font-style:italic;
                  border-top:1px solid #edf2f7;padding-top:20px">
          {{PS_LINE}}
        </p>
      </td>
    </tr>

    <!-- Footer -->
    <tr>
      <td style="background:#f8fafc;padding:20px 48px;border-top:1px solid #edf2f7">
        <p style="margin:0;font-size:12px;color:#a0aec0;text-align:center">
          {{BRAND_NAME}} &mdash;
          <a href="{{BRAND_URL}}" style="color:{{ACCENT_COLOR}};text-decoration:none">{{BRAND_URL}}</a>
          &nbsp;&bull;&nbsp;
          <a href="#" style="color:#a0aec0;text-decoration:none">Unsubscribe</a>
        </p>
      </td>
    </tr>

  </table>
  </td></tr>
</table>
</body>
</html>
