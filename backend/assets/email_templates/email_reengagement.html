<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{SUBJECT}}</title>
<div style="display:none;max-height:0;overflow:hidden;font-size:1px;color:#fafafa">
{{PREVIEW_TEXT}}&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;
</div>
</head>
<body style="margin:0;padding:0;background:#f4f5f7;font-family:Arial,Helvetica,sans-serif">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f5f7;padding:40px 0">
  <tr><td align="center">
  <table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:10px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.08)">

    <!-- Minimal header -->
    <tr>
      <td style="background:{{HEADER_COLOR}};padding:28px 40px">
        <table width="100%" cellpadding="0" cellspacing="0">
          <tr>
            <td>
              <h1 style="margin:0;font-size:24px;font-weight:900;color:#ffffff">{{BRAND_NAME}}</h1>
            </td>
            <td align="right">
              <span style="font-size:12px;color:rgba(255,255,255,0.60);font-weight:600;
                            text-transform:uppercase;letter-spacing:0.08em">We miss you</span>
            </td>
          </tr>
        </table>
      </td>
    </tr>

    <!-- Warm divider -->
    <tr>
      <td style="background:{{ACCENT_COLOR}};height:4px;font-size:0;line-height:0">&nbsp;</td>
    </tr>

    <!-- Body -->
    <tr>
      <td style="padding:44px 48px 28px">
        <h2 style="margin:0 0 22px;font-size:24px;font-weight:800;color:#1a202c;line-height:1.25">
          {{HEADLINE}}
        </h2>
        <p style="margin:0 0 28px;font-size:16px;line-height:1.75;color:#4a5568">
          {{BODY_CONTENT}}
        </p>
        <!-- Softer CTA -->
        <table cellpadding="0" cellspacing="0" style="margin:0 0 32px">
          <tr>
            <td style="background:{{ACCENT_COLOR}};border-radius:8px;padding:16px 36px">
              <a href="{{BRAND_URL}}"
                 style="color:{{CTA_TEXT_COLOR}};font-size:16px;font-weight:800;text-decoration:none;display:block">
                {{CTA_TEXT}}
              </a>
            </td>
          </tr>
        </table>
        <p style="margin:0;font-size:14px;line-height:1.6;color:#718096;font-style:italic;
                  border-top:1px solid #edf2f7;padding-top:20px">
          {{PS_LINE}}
        </p>
      </td>
    </tr>

    <!-- Footer -->
    <tr>
      <td style="background:#f8fafc;padding:20px 48px;border-top:1px solid #edf2f7">
        <p style="margin:0;font-size:12px;color:#a0aec0;text-align:center">
          {{BRAND_NAME}} &mdash;
          <a href="{{BRAND_URL}}" style="color:{{ACCENT_COLOR}};text-decoration:none">{{BRAND_URL}}</a>
          &nbsp;&bull;&nbsp;
          <a href="#" style="color:#a0aec0;text-decoration:none">Unsubscribe</a>
        </p>
      </td>
    </tr>

  </table>
  </td></tr>
</table>
</body>
</html>
