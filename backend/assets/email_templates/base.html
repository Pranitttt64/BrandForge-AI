<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>{{SUBJECT}}</title>
</head>
<body style="margin:0; padding:0; background-color:#f4f4f4; font-family:Helvetica,Arial,sans-serif; color:#333333;">
  <table width="100%" border="0" cellspacing="0" cellpadding="0" style="background-color:#f4f4f4; padding:40px 0;">
    <tr>
      <td align="center">
        <table width="600" border="0" cellspacing="0" cellpadding="0" style="background-color:#ffffff; border-radius:8px; overflow:hidden; box-shadow:0 4px 10px rgba(0,0,0,0.1);">
          <!-- Header -->
          <tr>
            <td style="background-color:{{HEADER_COLOR}}; padding:30px; text-align:center;">
              <h2 style="margin:0; color:#ffffff; font-size:24px; letter-spacing:2px; text-transform:uppercase;">{{BRAND_NAME}}</h2>
            </td>
          </tr>
          <!-- Body Content -->
          <tr>
            <td style="padding:40px;">
              <h1 style="margin:0 0 20px 0; font-size:28px; color:{{HEADER_COLOR}};">{{HEADLINE}}</h1>
              <p style="margin:0 0 30px 0; font-size:16px; line-height:1.6;">{{BODY_CONTENT}}</p>
              
              <!-- CTA Button -->
              <table border="0" cellspacing="0" cellpadding="0" style="margin:0 auto;">
                <tr>
                  <td align="center" style="border-radius:4px;" bgcolor="{{ACCENT_COLOR}}">
                    <a href="#" target="_blank" style="font-size:16px; font-weight:bold; color:#ffffff; text-decoration:none; border-radius:4px; padding:15px 30px; border:1px solid {{ACCENT_COLOR}}; display:inline-block;">{{CTA_TEXT}}</a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="background-color:#eeeeee; padding:20px; text-align:center;">
              <p style="margin:0; font-size:12px; color:#888888;">© 2026 {{BRAND_NAME}}. All rights reserved.</p>
              <p style="margin:5px 0 0 0; font-size:12px; color:#888888;">Generated by BrandForge AI</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
