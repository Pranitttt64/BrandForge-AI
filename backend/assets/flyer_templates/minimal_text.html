<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
@page { size: 794px 1123px; margin: 0; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { width: 794px; height: 1123px; font-family: 'Inter', Arial, sans-serif; background: #ffffff; }
.page { position: relative; width: 794px; height: 1123px; overflow: hidden; }

/* Header band */
.header {
  width: 794px; height: 210px;
  background: {{PRIMARY_COLOR}};
  position: relative; overflow: hidden;
}
.header-deco {
  position: absolute; right: -60px; top: -60px;
  width: 260px; height: 260px; border-radius: 50%;
  background: {{ACCENT_COLOR}}; opacity: 0.22;
}
.header-deco2 {
  position: absolute; left: 60px; bottom: -80px;
  width: 180px; height: 180px; border-radius: 50%;
  background: {{SECONDARY_COLOR}}; opacity: 0.30;
}
.brand-name {
  position: absolute; left: 52px; bottom: 40px;
  font-size: 46px; font-weight: 900; color: #ffffff; line-height: 1;
}
.brand-category {
  position: absolute; left: 54px; bottom: 20px;
  font-size: 11px; font-weight: 600; letter-spacing: 0.14em;
  text-transform: uppercase; color: rgba(255,255,255,0.52);
}

/* Body */
.body { padding: 64px 58px 0 58px; }
.headline {
  font-size: 46px; font-weight: 900; line-height: 1.08;
  color: {{SECONDARY_COLOR}}; text-align: center; margin-bottom: 16px;
}
.hero-text {
  font-size: 17px; line-height: 1.65; color: #4a5568;
  text-align: center; margin-bottom: 8px;
}
.tagline-line {
  width: 60px; height: 4px; background: {{ACCENT_COLOR}};
  margin: 22px auto 36px; border-radius: 2px;
}

/* Feature boxes */
.features { width: 100%; display: table; table-layout: fixed; }
.feature {
  display: table-cell; vertical-align: top;
  width: 33.33%; padding: 24px 20px 24px 20px;
  border-top: 6px solid {{ACCENT_COLOR}};
  background: #f8f9fb;
}
.feature + .feature { border-left: 1px solid #eaecef; }
.feature-number {
  font-size: 36px; font-weight: 900; color: {{ACCENT_COLOR}};
  line-height: 1; margin-bottom: 10px;
}
.feature-title {
  font-size: 16px; font-weight: 800; color: {{PRIMARY_COLOR}};
  line-height: 1.3; margin-bottom: 10px;
}
.feature-desc {
  font-size: 12px; line-height: 1.60; color: #606975;
}

/* Pitch */
.pitch-section {
  margin-top: 40px; padding: 28px 32px;
  background: #f0f4f8; border-radius: 10px;
  border-left: 5px solid {{PRIMARY_COLOR}};
}
.pitch-text {
  font-size: 15px; line-height: 1.72; color: #3b4450; font-style: italic;
}

/* CTA bottom band */
.cta-band {
  position: absolute; left: 0; right: 0; bottom: 0; height: 120px;
  background: {{ACCENT_COLOR}};
  text-align: center; padding-top: 36px;
}
.cta-text {
  font-size: 26px; font-weight: 900; color: #ffffff; letter-spacing: 0.02em;
}
.cta-url {
  font-size: 11px; color: rgba(255,255,255,0.60);
  margin-top: 6px; font-weight: 400;
}
</style>
</head>
<body>
<div class="page">
  <!-- Header -->
  <div class="header">
    <div class="header-deco"></div>
    <div class="header-deco2"></div>
    <div class="brand-name">{{BRAND_NAME}}</div>
    <div class="brand-category">{{BRAND_CATEGORY}}</div>
  </div>

  <!-- Body -->
  <div class="body">
    <h2 class="headline">{{HEADLINE}}</h2>
    <p class="hero-text">{{HERO_TEXT}}</p>
    <div class="tagline-line"></div>

    <!-- Feature blocks -->
    <div class="features">
      <div class="feature">
        <div class="feature-number">01</div>
        <div class="feature-title">{{USP_1_TITLE}}</div>
        <div class="feature-desc">{{USP_1_DESC}}</div>
      </div>
      <div class="feature">
        <div class="feature-number">02</div>
        <div class="feature-title">{{USP_2_TITLE}}</div>
        <div class="feature-desc">{{USP_2_DESC}}</div>
      </div>
      <div class="feature">
        <div class="feature-number">03</div>
        <div class="feature-title">{{USP_3_TITLE}}</div>
        <div class="feature-desc">{{USP_3_DESC}}</div>
      </div>
    </div>

    <!-- Elevator pitch quote block -->
    <div class="pitch-section">
      <div class="pitch-text">{{ELEVATOR_PITCH}}</div>
    </div>
  </div>

  <!-- CTA band -->
  <div class="cta-band">
    <div class="cta-text">{{CTA_TEXT}}</div>
    <div class="cta-url">{{BRAND_URL}}</div>
  </div>
</div>
</body>
</html>
