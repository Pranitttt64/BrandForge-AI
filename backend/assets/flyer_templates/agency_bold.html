<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap');

@page { size: A4; margin: 0; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  width: 210mm;
  height: 297mm;
  font-family: 'Inter', Helvetica, sans-serif;
  background: {{PANEL_BG}};
  overflow: hidden;
  position: relative;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}

/* Full bleed dark background */
.bg-full {
  position: absolute;
  inset: 0;
  background: {{PANEL_BG}};
}

/* Large geometric circle — top right */
.geo-circle-1 {
  position: absolute;
  top: -100px; right: -100px;
  width: 400px; height: 400px;
  border-radius: 50%;
  border: 60px solid {{ACCENT_10}};
  pointer-events: none;
}

/* Small filled circle — bottom left  */
.geo-circle-2 {
  position: absolute;
  bottom: 80px; left: -40px;
  width: 180px; height: 180px;
  border-radius: 50%;
  background: {{ACCENT_10}};
  pointer-events: none;
}

/* Diagonal stripe */
.geo-stripe {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(
    135deg,
    {{ACCENT_10}} 0%,
    transparent 30%,
    transparent 70%,
    {{ACCENT_06}} 100%
  );
  pointer-events: none;
}

/* Left accent bar */
.left-bar {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 5px;
  background: {{ACCENT}};
}

/* Content */
.content {
  position: relative;
  z-index: 10;
  display: flex;
  flex-direction: column;
  height: 100%;
  padding: 52px 56px 44px 64px;
}

.top-section { flex: 0; }

.brand-row {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 48px;
}

.brand-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: {{ACCENT}};
  flex-shrink: 0;
}

.brand-label {
  font-family: 'Syne', sans-serif;
  font-size: 10px;
  font-weight: 700;
  color: {{PANEL_TEXT}};
  opacity: 0.4;
  letter-spacing: 3px;
  text-transform: uppercase;
}

.hero-section {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.hero-eyebrow {
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  font-weight: 400;
  color: {{ACCENT}};
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 20px;
}

.hero-headline {
  font-family: 'Syne', sans-serif;
  font-size: 52px;
  font-weight: 900;
  color: {{PANEL_TEXT}};
  line-height: 1.0;
  letter-spacing: -2px;
  margin-bottom: 24px;
  max-width: 460px;
  word-break: normal;
  overflow-wrap: break-word;
}

.hero-tagline {
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 300;
  color: {{PANEL_TEXT}};
  opacity: 0.6;
  line-height: 1.6;
  max-width: 360px;
  margin-bottom: 36px;
  word-break: normal;
  overflow-wrap: break-word;
}

.hero-cta {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: {{CTA_BG}};
  color: {{CTA_TEXT_COLOR}};
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 700;
  padding: 14px 28px;
  border-radius: 6px;
  align-self: flex-start;
  letter-spacing: 0.2px;
}

/* USP grid — bottom section */
.usp-section {
  margin-top: 40px;
}

.usp-grid-row {
  display: flex;
  gap: 2px;
}

.usp-cell {
  flex: 1;
  background: {{ACCENT_10}};
  border-radius: 6px;
  padding: 16px 14px;
}

.usp-cell-num {
  font-family: 'Syne', sans-serif;
  font-size: 9px;
  font-weight: 700;
  color: {{ACCENT}};
  letter-spacing: 1px;
  margin-bottom: 6px;
}

.usp-cell-title {
  font-family: 'Syne', sans-serif;
  font-size: 11.5px;
  font-weight: 700;
  color: {{PANEL_TEXT}};
  line-height: 1.3;
  margin-bottom: 4px;
  word-break: normal;
  overflow-wrap: break-word;
}

.usp-cell-desc {
  font-family: 'Inter', sans-serif;
  font-size: 9.5px;
  font-weight: 400;
  color: {{PANEL_TEXT}};
  opacity: 0.45;
  line-height: 1.5;
  word-break: normal;
  overflow-wrap: break-word;
}

.footer-strip {
  margin-top: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.footer-url {
  font-family: 'Inter', sans-serif;
  font-size: 9px;
  color: {{PANEL_TEXT}};
  opacity: 0.2;
}

.footer-gen {
  font-family: 'Inter', sans-serif;
  font-size: 8px;
  color: {{PANEL_TEXT}};
  opacity: 0.15;
}
</style>
</head>
<body>

<div class="bg-full"></div>
<div class="geo-circle-1"></div>
<div class="geo-circle-2"></div>
<div class="geo-stripe"></div>
<div class="left-bar"></div>

<div class="content">
  <div class="brand-row">
    <div class="brand-dot"></div>
    <div class="brand-label">{{BRAND_NAME}}</div>
  </div>

  <div class="hero-section">
    <div class="hero-eyebrow">{{BRAND_CATEGORY}}</div>
    <div class="hero-headline">{{HEADLINE}}</div>
    <div class="hero-tagline">{{TAGLINE}}</div>
    <div class="hero-cta">{{CTA_TEXT}} →</div>
  </div>

  <div class="usp-section">
    <div class="usp-grid-row">
      <div class="usp-cell">
        <div class="usp-cell-num">01</div>
        <div class="usp-cell-title">{{USP_1_TITLE}}</div>
        <div class="usp-cell-desc">{{USP_1_DESC}}</div>
      </div>
      <div class="usp-cell">
        <div class="usp-cell-num">02</div>
        <div class="usp-cell-title">{{USP_2_TITLE}}</div>
        <div class="usp-cell-desc">{{USP_2_DESC}}</div>
      </div>
      <div class="usp-cell">
        <div class="usp-cell-num">03</div>
        <div class="usp-cell-title">{{USP_3_TITLE}}</div>
        <div class="usp-cell-desc">{{USP_3_DESC}}</div>
      </div>
      <div class="usp-cell">
        <div class="usp-cell-num">04</div>
        <div class="usp-cell-title">{{USP_4_TITLE}}</div>
        <div class="usp-cell-desc">{{USP_4_DESC}}</div>
      </div>
    </div>
  </div>

  <div class="footer-strip">
    <div class="footer-url">{{BRAND_URL}}</div>
    <div class="footer-gen">Generated by {{GENERATOR}}</div>
  </div>
</div>

</body>
</html>
