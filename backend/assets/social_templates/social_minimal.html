<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  background: {{BG}};
  -webkit-font-smoothing: antialiased;
}

.card {
  width: 1080px;
  height: 1080px;
  position: relative;
  background: {{BG}};
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* Top Accent Bar */
.top-bar {
  width: 100%;
  height: 5px;
  background: {{ACCENT}};
}

/* Content Container */
.content {
  flex: 1;
  padding: 100px 120px;
  display: flex;
  flex-direction: column;
}

/* Huge Brand Name */
.brand-name {
  font-family: 'Syne', sans-serif;
  font-size: 120px;
  font-weight: 900;
  color: {{TEXT}};
  line-height: 0.9;
  letter-spacing: -6px;
  margin-bottom: 60px;
  text-transform: uppercase;
  word-break: normal;
  overflow-wrap: break-word;
}

/* Large Divider */
.divider {
  width: 180px;
  height: 6px;
  background: {{ACCENT}};
  margin-bottom: 60px;
}

/* Headline */
.headline {
  font-family: 'Syne', sans-serif;
  font-size: 64px;
  font-weight: 700;
  color: {{TEXT}};
  line-height: 1.1;
  letter-spacing: -2px;
  margin-bottom: 30px;
  max-width: 800px;
  word-break: normal;
  overflow-wrap: break-word;
}

/* Tagline */
.tagline {
  font-family: 'Inter', sans-serif;
  font-size: 24px;
  font-weight: 300;
  color: {{TEXT}};
  opacity: 0.45;
  line-height: 1.6;
  max-width: 700px;
  margin-bottom: auto;
  word-break: normal;
  overflow-wrap: break-word;
}

/* USPs - 3 items inline with dots */
.usp-row {
  display: flex;
  align-items: center;
  justify-content: flex-start;
  gap: 20px;
  margin-bottom: 60px;
}

.usp-item {
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: {{TEXT}};
  text-transform: uppercase;
  letter-spacing: 2px;
}

.usp-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: {{ACCENT}};
  opacity: 0.8;
}

/* Footer: CTA + URL */
.footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-top: 1px solid rgba(0, 0, 0, 0.08);
  padding-top: 40px;
}

.cta-btn {
  display: inline-flex;
  align-items: center;
  background: {{CTA_BG}};
  color: {{CTA_TEXT_COLOR}};
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  font-weight: 700;
  padding: 18px 36px;
  border-radius: 8px;
  letter-spacing: 0.5px;
}

.footer-meta {
  text-align: right;
}

.footer-url {
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 500;
  color: {{TEXT}};
  opacity: 0.3;
  margin-bottom: 6px;
}

.footer-gen {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  color: {{TEXT}};
  opacity: 0.15;
}

</style>
</head>
<body>
<div class="card">
  <div class="top-bar"></div>
  
  <div class="content">
    <div class="brand-name">{{BRAND_NAME}}</div>
    
    <div class="divider"></div>
    
    <div class="headline">{{HEADLINE}}</div>
    
    <div class="tagline">{{TAGLINE}}</div>
    
    <div class="usp-row">
      <div class="usp-item">{{USP_1_TITLE}}</div>
      <div class="usp-dot"></div>
      <div class="usp-item">{{USP_2_TITLE}}</div>
      <div class="usp-dot"></div>
      <div class="usp-item">{{USP_3_TITLE}}</div>
    </div>
    
    <div class="footer">
      <div class="cta-btn">{{CTA_TEXT}} →</div>
      <div class="footer-meta">
        <div class="footer-url">{{BRAND_URL}}</div>
        <div class="footer-gen">Generated by {{GENERATOR}}</div>
      </div>
    </div>
    
  </div>
</div>
</body>
</html>
