<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  background: {{BG}};
  -webkit-font-smoothing: antialiased;
}

.card {
  width: 1080px;
  height: 1080px;
  position: relative;
  background: {{BG}};
  overflow: hidden;
}

/* Accent corner fill — top left */
.corner-accent {
  position: absolute;
  top: 0; left: 0;
  width: 320px; height: 320px;
  background: {{ACCENT_10}};
  clip-path: polygon(0 0, 100% 0, 0 100%);
  pointer-events: none;
}

/* Bottom right fill */
.corner-accent-br {
  position: absolute;
  bottom: 0; right: 0;
  width: 220px; height: 220px;
  background: {{ACCENT_06}};
  clip-path: polygon(100% 0, 100% 100%, 0 100%);
  pointer-events: none;
}

/* Horizontal lines grid */
.grid-lines {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

.grid-line {
  position: absolute;
  left: 0; right: 0;
  height: 0.5px;
  background: {{TEXT}};
  opacity: 0.04;
}

/* Right accent bar */
.right-bar {
  position: absolute;
  top: 0; right: 0; bottom: 0;
  width: 5px;
  background: {{ACCENT}};
  z-index: 10;
}

/* Content */
.content {
  position: absolute;
  inset: 0;
  padding: 80px 86px;
  display: flex;
  flex-direction: column;
  z-index: 5;
}

/* Brand */
.brand-area {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 72px;
}

.brand-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  background: {{ACCENT}};
  flex-shrink: 0;
}

.brand-name {
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: {{TEXT}};
  letter-spacing: 3px;
  text-transform: uppercase;
  opacity: 0.35;
}

/* Main headline */
.headline {
  font-family: 'Syne', sans-serif;
  font-size: 88px;
  font-weight: 900;
  color: {{TEXT}};
  line-height: 0.98;
  letter-spacing: -4px;
  margin-bottom: 32px;
  max-width: 860px;
  word-break: normal;
  overflow-wrap: break-word;
  hyphens: auto;
}

.accent-word {
  color: {{ACCENT}};
}

/* Tagline */
.tagline {
  font-family: 'Inter', sans-serif;
  font-size: 20px;
  font-weight: 300;
  color: {{TEXT}};
  opacity: 0.45;
  line-height: 1.6;
  max-width: 640px;
  margin-bottom: 60px;
  word-break: normal;
  overflow-wrap: break-word;
}

/* USP row */
.usp-row {
  display: flex;
  gap: 24px;
  margin-bottom: 48px;
}

.usp-item {
  flex: 1;
  padding: 20px 0;
  border-top: 2px solid {{TEXT}};
}

.usp-item-num {
  font-family: 'Syne', sans-serif;
  font-size: 10px;
  font-weight: 700;
  color: {{ACCENT}};
  letter-spacing: 1.5px;
  margin-bottom: 10px;
}

.usp-item-title {
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: {{TEXT}};
  line-height: 1.3;
  margin-bottom: 6px;
  word-break: normal;
  overflow-wrap: break-word;
}

.usp-item-desc {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  color: {{TEXT}};
  opacity: 0.4;
  line-height: 1.5;
  word-break: normal;
  overflow-wrap: break-word;
}

/* Bottom row */
.bottom-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: auto;
}

.cta-btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: {{CTA_BG}};
  color: {{CTA_TEXT_COLOR}};
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 700;
  padding: 17px 34px;
  border-radius: 8px;
}

.bottom-right {
  text-align: right;
}

.bottom-url {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  color: {{TEXT}};
  opacity: 0.2;
  margin-bottom: 4px;
}

.bottom-gen {
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  color: {{TEXT}};
  opacity: 0.12;
}
</style>
</head>
<body>
<div class="card">

  <div class="corner-accent"></div>
  <div class="corner-accent-br"></div>
  <div class="grid-lines">
    <div class="grid-line" style="top:25%"></div>
    <div class="grid-line" style="top:50%"></div>
    <div class="grid-line" style="top:75%"></div>
  </div>
  <div class="right-bar"></div>

  <div class="content">

    <div class="brand-area">
      <div class="brand-dot"></div>
      <div class="brand-name">{{BRAND_NAME}}</div>
    </div>

    <div class="headline">{{HEADLINE}}</div>
    <div class="tagline">{{TAGLINE}}</div>

    <div class="usp-row">
      <div class="usp-item">
        <div class="usp-item-num">01</div>
        <div class="usp-item-title">{{USP_1_TITLE}}</div>
        <div class="usp-item-desc">{{USP_1_RAW}}</div>
      </div>
      <div class="usp-item">
        <div class="usp-item-num">02</div>
        <div class="usp-item-title">{{USP_2_TITLE}}</div>
        <div class="usp-item-desc">{{USP_2_RAW}}</div>
      </div>
      <div class="usp-item">
        <div class="usp-item-num">03</div>
        <div class="usp-item-title">{{USP_3_TITLE}}</div>
        <div class="usp-item-desc">{{USP_3_RAW}}</div>
      </div>
    </div>

    <div class="bottom-row">
      <div class="cta-btn">{{CTA_TEXT}} →</div>
      <div class="bottom-right">
        <div class="bottom-url">{{BRAND_URL}}</div>
        <div class="bottom-gen">Generated by {{GENERATOR}}</div>
      </div>
    </div>

  </div>
</div>
</body>
</html>
